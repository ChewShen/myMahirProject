@if (courseData) {
  <div class="bg-background min-h-[80vh] flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md text-body-md antialiased">
    
    <main class="bg-surface-container-lowest w-full max-w-sm rounded-lg shadow-sm hover:shadow-[0px_10px_15px_rgba(0,0,0,0.05)] transition-shadow duration-300 border border-outline-variant/30 flex flex-col p-md gap-gutter">
      
      <header class="flex flex-col gap-base">
        <h1 class="font-headline-md text-headline-md text-on-surface">{{ courseData.courseName }}</h1>
        
        <div class="self-start">
          <span class="inline-flex items-center gap-xs bg-surface-container-high text-primary font-label-sm text-label-sm px-3 py-1 rounded-full">
            <span class="material-symbols-outlined" style="font-size: 14px;">donut_large</span>
            {{ courseData.courseStatus }}
          </span>
        </div>
      </header>
      
      <section>
        <p class="font-body-md text-body-md text-on-surface-variant">
          This is where your long course content paragraph will go. Once a student finishes reading this, they will click the button below to prove they understand it!
        </p>
      </section>
      
      <footer class="mt-base">
        <button class="w-full bg-secondary hover:bg-primary active:scale-[0.98] transition-all duration-200 text-on-primary font-label-md text-label-md py-sm px-md rounded-lg flex items-center justify-center gap-base group">
          Test My Knowledge
          <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform duration-200">arrow_forward</span>
        </button>
      </footer>
    </main>

  </div>
} @else {
  <div class="flex items-center justify-center min-h-[80vh] text-on-surface">
    <h3 class="text-xl font-semibold">Loading course from database...</h3>
  </div>
}
