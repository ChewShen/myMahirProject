<header class="mb-lg">
  <h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Welcome back, Ali.</h2>
  <p class="font-body-md text-body-md text-on-surface-variant">Here is an overview of your academic progress today.</p>
</header>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
  <div class="lg:col-span-2 flex flex-col gap-lg">
    <section>
      <div class="flex justify-between items-end mb-6">
        <h3 class="font-headline-sm text-headline-sm text-on-surface">In Progress</h3>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        @for (course of courseList; track course.courseId) {
          <div class="bg-surface-container-lowest rounded-xl ambient-shadow ambient-shadow-hover transition-all duration-300 overflow-hidden flex flex-col cursor-pointer border border-outline/10 group">
            
            <div class="h-32 bg-secondary relative w-full overflow-hidden flex items-center justify-center">
               <span class="material-symbols-outlined text-white text-5xl opacity-50">menu_book</span>
            </div>
            
            <div class="p-md flex flex-col flex-grow">
              <div class="flex justify-between items-start mb-2">
                <span class="inline-block px-3 py-1 bg-surface-container-low text-primary-container rounded-full font-label-sm text-label-sm">
                  {{ course.courseStatus }}
                </span>
              </div>
              <h4 class="font-headline-sm text-headline-sm text-on-surface mb-2 line-clamp-2">{{ course.courseName }}</h4>
              <p class="font-body-sm text-body-sm text-on-surface-variant mb-6 line-clamp-2 flex-grow">{{ course.courseContent }}</p>
              
              <div class="mt-auto">
                <button routerLink="/course" class="w-full bg-surface-container text-primary hover:bg-surface-container-high font-label-md py-2 rounded-lg transition-colors">
                  Continue Learning
                </button>
              </div>
            </div>
          </div>
        }

      </div>
    </section>
  </div>

  <div class="flex flex-col gap-6">
    <section>
      <h3 class="font-headline-sm text-headline-sm text-on-surface mb-6">Quick Stats</h3>
      <div class="grid grid-cols-1 gap-4">
        
        <div class="bg-surface-container-lowest p-5 rounded-xl ambient-shadow border border-outline/10 flex items-center justify-between">
          <div>
            <p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">Courses Completed</p>
            <p class="font-display-lg text-display-lg text-on-surface">1</p>
          </div>
          <div class="w-12 h-12 rounded-full bg-primary-fixed text-primary-container flex items-center justify-center">
            <span class="material-symbols-outlined">workspace_premium</span>
          </div>
        </div>

      </div>
    </section>
  </div>
</div>
