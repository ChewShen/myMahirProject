<div class="w-full flex justify-center px-4">
  
  <mat-card style="width: 95vw; max-width: 700px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);">
    
    <div style="text-align: center; padding: 24px 0 0 0;">
      <mat-icon color="primary" style="transform: scale(2);">school</mat-icon>
      <h1 style="margin-top: 16px; margin-bottom: 0; color: #00236f;">myMahir Education Platform</h1>
    </div>

    <mat-tab-group mat-stretch-tabs="false" mat-align-tabs="center">
      
      <mat-tab label="Login">
        <mat-card-content style="padding: 24px 80px 24px 80px;">
          
          <form [formGroup]="loginForm" (ngSubmit)="onLogin()" style="display: flex; flex-direction: column; gap: 16px;">
            
            <mat-form-field appearance="outline">
              <mat-label>Email Address</mat-label>
              <input matInput type="email" formControlName="email" placeholder="student@mymahir.com">
              <mat-icon matSuffix>email</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Password</mat-label>
              <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
              <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
                <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
            </mat-form-field>

            <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid || isLoading" style="padding: 24px 0; font-size: 16px; border-radius: 8px;">
              {{ isLoading ? 'Authenticating...' : 'Sign In' }}
            </button>
            
          </form>

        </mat-card-content>
      </mat-tab>

      <mat-tab label="Register">
        <mat-card-content style="padding: 24px 80px 24px 80px;">
          
          <form [formGroup]="registerForm" (ngSubmit)="onRegister()" style="display: flex; flex-direction: column; gap: 16px;">
            
            <mat-form-field appearance="outline">
              <mat-label>Full Name</mat-label>
              <input matInput formControlName="name" placeholder="Ali bin Abu">
              <mat-icon matSuffix>person</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Email Address</mat-label>
              <input matInput type="email" formControlName="email">
              <mat-icon matSuffix>email</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Password</mat-label>
              <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
              <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
                <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
              <mat-hint>Must be at least 6 characters</mat-hint>
            </mat-form-field>

            <button mat-flat-button color="accent" type="submit" [disabled]="registerForm.invalid || isLoading" style="padding: 24px 0; font-size: 16px; border-radius: 8px; margin-top: 8px;">
              {{ isLoading ? 'Creating Account...' : 'Create Account' }}
            </button>
            
          </form>

        </mat-card-content>
      </mat-tab>

    </mat-tab-group>
  </mat-card>

</div>
